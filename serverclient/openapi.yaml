  /clientpage/data/update:
    post:
      tags:
        - ClientPage
      summary: 修改會員資料 (email, phone, sex)
      description: |
        - 需登入，`account` + `birthday` 不可修改
        - 用textfield方式呈現，default value 為原本會員資料
          - 密碼不需要放default value
        - textfeild value不可為空值
        - 送出後要檢查
          - 所有欄位皆為required
            - cName:  1<=長度<=30
            - account:需含大小寫、符號、8<=長度<=20
            - email: >=8,<=20
            - phone: 長度 == 10
            - birthday: 日期<=現在日期
          - account、password、phone、email皆不可重複
      requestBody:
        required: true
        content:
            application/json:
              schema:
                type: object
                properties:
                  cId:
                    type: string
                    minLength: 8
                    maxLength: 8
                    pattern: "^(?=.*[a-zA-Z])(?=.*[0-9])(?=.*[!@#$%^&*()_+={}:;,.<>?/~]).{8}$"  # 包含大小寫字母、數字和符號
                    description: 會員編號 (PK)，英文字+7位數字
                    example: "a0000004"
                  cName:
                    type: string
                    maxLength: 30
                    pattern: "^(?=.*[a-zA-Z])(?=.*[!@#$%^&*()_+={}:;,.<>?/~]).{1,30}$"  # 包含大小寫字母和符號
                    description: 會員名稱
                    example: "小明"
                  account:
                    type: string
                    minLength: 8
                    maxLength: 20
                    description: 帳號，長度 >= 8 且 <= 20
                    example: "Root_123456"
                  email:
                    type: string
                    minLength: 11
                    maxLength: 64
                    format: email
                    description: 電子信箱，長度 > 10 且 < 64，符合 email 格式
                  phone:
                    type: string
                    minLength: 10
                    maxLength: 10
                    pattern: "^[0-9]{10}$"  # 長度 == 10 且只包含數字
                    description: 電話，長度 == 10
                    example: "0900000000"
                  sex:
                    type: string
                    maxLength: 14
                    description: 性別
                    example: "f"
                  birthday:
                    type: string
                    format: date-time
                    description: 生日，日期 <= 現在日期
                    example: "2000-01-01T00:00:00Z"
                required:
                  - cId
                  - cName
                  - account
                  - email
                  - phone
                  - sex
                  - birthday
                additionalProperties: false
      responses:
        "200":
          description: "修改成功"
        "400":
          description: "請求參數錯誤或更新失敗"
        "401":
          description: "未登入或權限不足"
          
