openapi: 3.0.0
info:
  title: 美妝比價平台 API
  description: version 2.2.0 社群API第一版
  version: 2.2.0
servers:
  - url: http://localhost:5000/
tags:
  - name: Post
    description: 社群功能
  - name: ProductPicture
    description: 用來取得商品圖片的路由，要上快取
  - name: Frame
    description: 網頁的框架 (header + footer)
  - name: HomePage
    description: 主畫面的Body
  - name: LoginPage
    description: 登入頁面
  - name: RegisterPage
    description: 註冊表單驗證required跟不可重複部分，結束後送出
  - name: GoodPage
    description: 條列式陳列該品項所有商品
  - name: GoodDetail
    description: 單一商品詳細頁面
  - name: ClientPage
    description: 用戶個人頁面
  - name: BackendPage
    description: 後臺管理頁面(暫無內容)

paths:
  /post:
    get:
      tags:
        - Post
      summary: (社群主頁面)取得所有文章(看能不能上cache)
      responses:
        "200":
          description: "回傳所有文章清單"
          content:
            application/json:
              schema:
                type: array
                items:
                    type: object
                    properties:
                      postId: 
                        type: integer
                        example: 1
                      cId:
                        type: string
                        description: "用戶id"
                        example: "C01"
                      cName:
                        type: string
                        description: "用戶名稱" 關聯client取得
                        example: "小明"
                      title:
                        type: string
                        example: "夏日美妝大賞"
                      like: 
                        description: "按讚數"
                        type: integer
                        example: 10
                      commentAmount:
                        description: |
                          此文章的留言數
                          
                          `SELECT COUNT(*) 
                            FROM CommentInf
                            WHERE postId = ?`
                        type: integer
                        example: 4
                      content:
                        description: "內文"
                        type: string
                        example: "以下略..."
                      CRT_DATE:
                        type: string
                        example: "2025-06-16"
                      MDF_DATE:
                        type: string
                        example: "2025-06-16"
                      isLike:
                        type: integer
                        description: 關聯PostLike，確認該postId與cId是否存於此表(是否按讚此文章)
                        example: 1
  /post/search:
    get:
      tags:
        - Post
      summary: 搜尋文章
      description: 根據關鍵字搜尋文章標題或內容。LIKE模糊搜尋
      parameters:
        - name: keyword
          in: query
          required: true
          description: 搜尋關鍵字
          schema:
            type: string
            example: "美妝"

      responses:
        "200":
          description: 成功取得搜尋結果
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    postId:
                      type: integer
                      example: 1
                    cId:
                      type: string
                      description: 用戶id
                      example: "C01"
                    cName:
                      type: string
                      description: 用戶名稱
                      example: "小明"
                    title:
                      type: string
                      example: "夏日美妝大賞"
                    like:
                      type: integer
                      description: 按讚數
                      example: 10
                    commentAmount:
                      type: integer
                      description: |
                        此文章的留言數
                        
                        `SELECT COUNT(*) 
                          FROM CommentInf 
                          WHERE postId = ?`
                      example: 4
                    content:
                      type: string
                      description: 內文
                      example: "以下略..."
                    CRT_DATE:
                      type: string
                      example: "2025-06-16"
                    MDF_DATE:
                      type: string
                      example: "2025-06-16"
                    isLike:
                        type: integer
                        description: 關聯PostLike，確認該postId與cId是否存於此表(當前用戶是否按讚此文章)
                        example: 1

        "203":
          description: 未取得內容（無搜尋結果）
        "204":
          description: 無內容（無搜尋結果）
        "500":
          description: 伺服器錯誤                      
  /post/{cId}:
    get:
      tags:
        - Post
      summary: 取得特定使用者發表的文章
      description: 依照 cId 取得該使用者發表的所有文章
      parameters:
        - name: cId
          in: path
          required: true
          description: 使用者 ID
          schema:
            type: string
            example: "C01"
      responses:
        "200":
          description: 成功取得文章列表
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    postId:
                      type: integer
                      example: 1
                    cId:
                      type: string
                      description: 用戶id
                      example: "C01"
                    cName:
                      type: string
                      description: 用戶名稱
                      example: "小明"
                    title:
                      type: string
                      example: "夏日美妝大賞"
                    like:
                      type: integer
                      description: 按讚數
                      example: 10
                    commentAmount:
                      type: integer
                      description: |
                        此文章的留言數
                        
                        `SELECT COUNT(*) 
                          FROM CommentInf
                          WHERE postId = ?`
                      example: 4
                    content:
                      type: string
                      description: 內文
                      example: "以下略..."
                    CRT_DATE:
                      type: string
                      example: "2025-06-16"
                    MDF_DATE:
                      type: string
                      example: "2025-06-16"
                    isLike:
                        type: integer
                        description: 關聯PostLike，確認該postId與cId是否存於此表(當前用戶是否按讚此文章)
                        example: 1
        "203":
          description: 未取得內容（無文章）
        "204":
          description: 無內容（無文章）
        "500":
          description: 伺服器錯誤
          
  /post/{postId}:
    get:
      tags:
        - Post
      summary: (特定文章頁)取得特定文章
      parameters:
        - name: postId
          in: path
          required: true
          description: 貼文流水號
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: object
                    properties:
                      postId:
                        type: integer
                        example: 1
                      cId:
                        description: "發布文章用戶"
                        type: string
                        example: "C01"
                      cName:
                        description: "用戶名稱"
                        example: "大明"
                      title:
                        type: string
                        example: "夏日美妝空空賞"
                      content:
                        type: string
                        example: "以下略..."
                      like: 
                        description: "按讚數"
                        type: integer
                        example: 10
                      CRT_DATE:
                        type: string
                        example: "2025-06-16"
                      MDF_DATE:
                        type: string
                        example: "2025-06-16"
                      isLike:
                        type: integer
                        description: 關聯PostLike，確認該postId與cId是否存於此表(當前用戶是否按讚此文章)
                        example: 1
                      
  /post/comment/{cId}:
    get:
      tags:
        - Post
      summary: (client setting頁面)根據 cId 取得留言清單
      description: 傳入使用者 ID，回傳該使用者發表過的所有留言。
      parameters:
        - name: cId
          in: path
          required: true
          description: 使用者 ID
          schema:
            type: string
            example: C01
      responses:
        "200":
          description: 回傳留言清單
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    commendId:
                      type: integer
                      example: 1
                    postId:
                      type: integer
                      example: 2
                    cId:
                      type: string
                      example: C01
                    cName:
                      type: string
                      example: 小明
                    comment:
                      type: string
                      example: 很實用的內容！
                    CRT_DATE:
                      type: string
                      example: 2025-06-18 10:15:00
        "404":
          description: 找不到留言記錄  
                        
  /post/comment/{postId}:
    get:
      tags:
        - Post
      summary: (特定文章頁)根據 postId 取得留言清單
      description: 傳入貼文流水號，回傳該貼文下所有留言資料。
      parameters:
        - name: postId
          in: path
          required: true
          description: 貼文流水號
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: 回傳留言清單
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    commendId:
                      type: integer
                      example: 1
                    postId:
                      type: integer
                      example: 1
                    cId:
                      type: string
                      description: 留言者ID
                      example: C01
                    cName:
                      type: string
                      description: 留言者名稱
                      example: 小明
                    comment:
                      type: string
                      description: 留言內容
                      example: 我也很喜歡這篇分享！
                    CRT_DATE:
                      type: string
                      description: 留言時間
                      example: 2025-06-16 12:30:00                 
                      
  /post/comment/save:
    post:
      tags:
        - Post
      summary: 根據 commendId 新增/刪除留言
      description: 傳入留言流水號(新增的話流水號為0)與editType新增/刪除留言
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                commendId:
                  type: integer
                  description: 貼文流水號
                  example: 1
                editType:
                  type: integer
                  description: 修改類型 1新增 3刪除
      responses:
        "200":
          description: 留言刪除成功
  
  /post/save:
    post:
      tags:
        - Post
      summary: 修改/儲存/刪除 貼文（僅允許修改 title 與 content）
      description: 修改(1)/儲存(2)/刪除(3)邏輯根據editType判斷，資料庫根據 postId 修改貼文標題與內容，並且要更新MDF_DATE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                postId:
                  type: integer
                  description: 貼文流水號
                  example: 1
                title:
                  type: string
                  description: 修改後的標題
                  example: "夏日控油新攻略"
                content:
                  type: string
                  description: 修改後的內文
                  example: "這次要分享幾款平價又好用的控油產品..."
                editType:
                  type: integer
                  description: 修改類型 1新增 2修改 3刪除
      responses:
        "200":
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "貼文修改成功"
                  post:
                    type: object
                    properties:
                      postId:
                        type: integer
                        example: 1
                      title:
                        type: string
                        example: "夏日控油新攻略"
                      content:
                        type: string
                        example: "這次要分享幾款平價又好用的控油產品..."
                      MDF_DATE:
                        type: string
                        example: "2025-10-26 15:20:00" 

  /post/like:
    post:
      tags:
        - Post
      summary: 修改Table> PostLike的按讚狀態
      description: |
        根據 editType 修改按讚狀態。
        - editType = 1：新增按讚  
        - editType = 3：取消按讚
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cId
                - postId
                - editType
              properties:
                cId:
                  type: string
                  description: 使用者 ID
                  example: "C01"
                postId:
                  type: integer
                  description: 貼文 ID
                  example: 1001
                editType:
                  type: integer
                  description: |
                    1 = 新增按讚  
                    3 = 刪除按讚
                  enum: [1, 3]
                  example: 1
      responses:
        "200":
          description: 成功修改按讚狀態
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Like updated."
        "400":
          description: 請求格式錯誤
        "500":
          description: 伺服器錯誤
  
  /post/like/{cId}:
    get:
      tags:
        - Post
      summary: 取得使用者按讚的文章
      description: |
        查詢 PostLike 依 cId 取得所有按讚過的 postId，
        並關聯 PostInf 取回文章列表，
        最終依 PostLike.CRT_DATE 排序。
      parameters:
        - name: cId
          in: path
          required: true
          description: 使用者 ID
          schema:
            type: string
            example: "C01"

      responses:
        "200":
          description: 成功取得使用者按讚列表
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    postId:
                      type: integer
                      example: 1
                    cId:
                      type: string
                      description: 用戶id
                      example: "C01"
                    cName:
                      type: string
                      description: 用戶名稱
                      example: "小明"
                    title:
                      type: string
                      example: "夏日美妝大賞"
                    like:
                      type: integer
                      description: 按讚數
                      example: 10
                    commentAmount:
                      type: integer
                      description: |
                        此文章的留言數
                        
                        `SELECT COUNT(*)
                          FROM CommentInf
                          WHERE postId = ?`
                      example: 4
                    content:
                      type: string
                      description: 內文
                      example: "以下略..."
                    MDF_DATE:
                      type: string
                      example: "2025-06-16"
                    CRT_DATE:
                      type: string
                      description: 使用者按下喜歡時的時間 (PostLike.CRT_DATE)
                      example: "2025-06-17 10:20:30"
                    isLike:
                        type: integer
                        description: 關聯PostLike，確認該postId與cId是否存於此表(當前用戶是否按讚此文章)這邊一定是true
                        example: 1

        "203":
          description: 未取得內容（此使用者無按讚文章）
        "204":
          description: 無內容（此使用者無按讚文章）
        "500":
          description: 伺服器錯誤
        
  /productPicture/{pId}:
    get:
      tags:
        - ProductPicture
      summary: 取得商品圖片
      parameters:
        - name: pId
          in: path
          required: true
          description: 商品編號
          schema:
              type: string
              example: "a0000001"
      responses:
        "200":
          description: "success"
      
  /frame/search:
    post:
      tags:
        - Frame
      summary: (sql 取得price部分要改) 送出搜尋關鍵字 (用Like搜尋pName或brand)
      operationId: searchProduct
      requestBody:
        description: 搜尋請求
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        "200":
          description: "success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        "400":
          description: "Invalid request parameter"
        "404":
          description: "find no result"
          
  /homepage/product:
    get:
      tags:
        - HomePage
      summary: (sql 取得price部分要改)(+cache)顯示 所有/特定類別 商品(order by clickTimes)
      parameters:
      - name: category
        in: query
        required: false
        description: (從Frame傳參數)商品品項類別（若不提供，則回傳所有商品）
        schema:
          type: string
          example: "臉部保養"
      responses:
        "200":
          description: "success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        "400":
          description: "Invalid request parameter"
        "404":
          description: "find no result"
  /homepage/priceHistory/{pId}:
    get:
      tags:
        - HomePage
      summary: (本次新增)取得特別商品歷史價格紀錄
      parameters:
        - name: pId
          in: path
          required: true
          description: 商品編號
          schema:
              type: string
              example: "a0000001"
      responses:
        "200":
          description: "success"
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: object
                    properties:
                      pId:
                        type: string
                        maxLength: 8
                        example: "a0000001"
                      updateTime:
                        type: string
                        example: "2025-06-16 19:28:18.447"
                      prePrice:
                        type: number
                        example: 299.00
                      storeName:
                        type: string
                        example: 屈臣氏,康是美,寶雅
        "400":
          description: "Invalid request parameter"
        "404":
          description: "find no result"
  /goodpage/product:
    get:
      tags:
        - GoodPage
      summary: (sql 取得price部分要改)(+cache)顯示 所有/特定類別 商品(order by clickTimes)
      parameters:
      - name: category
        in: query
        required: false
        description: (從Frame傳參數)商品品項類別（若不提供，則回傳所有商品）
        schema:
          type: string
          example: "臉部保養"
      responses:
        "200":
          description: "success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        "400":
          description: "Invalid request parameter"
        "404":
          description: "find no result"
          
  /loginpage/login:
    post:
      tags:
        - LoginPage
      summary: (+token)表單驗證完登入
      description: 先做表單驗證，account password必填
      requestBody:
        description: 搜尋請求
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: "success"
        "400":
          description: "Invalid request parameter"
        "404":
          description: "find no result"
  /registerpage/register:
    post:
      tags:
        - RegisterPage
      summary: 表單驗證完註冊
      description: |
        - 所有欄位皆為required
          - cName:  1<=長度<=30
          - account:需含大小寫、符號、8<=長度<=20
          - **password: 需含大小寫、符號、8<=長度<=20**
          - email: >=8,<=20
          - phone: 長度 == 10
          - birthday: 日期<=現在日期
        - account、phone、email皆不可重複
        - 以上確認後可送出
        - email認證
        - 產生一筆會員編號
          - 一位英文字母+7位數字
          - example: a0000001
        - 密碼編碼儲存
        - 儲存登入狀態
      requestBody:
        description: 含所有欄位
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInfo'
      responses:
        "200":
          description: "success"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientId'
        "400":
          description: "Invalid request parameter"
        "404":
          description: "problem"
  
  /gooddetail/product/{pId} :
    get:
      tags:
        - GoodDetail
      summary: (sql 取得price部分要改)取得特定商品詳細資料
      description: 把pId傳進來
      parameters:
        - name: pId
          in: path
          required: true
          description: 商品編號
          schema:
              type: string
              example: "a0000001"
      responses:
        "200":
          description: "success"
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: object
                    properties:
                      pId:
                        type: string
                        maxLength: 8
                        example: "a0000001"
                      pName:
                        type: string
                        maxLength: 50
                        example: "霓淨思超爆水面膜5片-潤澤保濕"
                      brand:
                        type: string
                        maxLength: 30
                        example: "霓淨思"
                      category:
                        type: string
                        maxLength: 20
                        example: "臉部保養"
                      price_max:
                        type: number
                        description: 最高價格
                        example: 299.00
                      price_min:
                        type: number
                        description: 最低價格
                        example: 250.00
                      clickTimes:
                        type: integer
                        example: 3
                      review:
                        type: number
                        example: 4.5
                      isTrack:
                        type: boolean
                        description: 用戶追蹤狀態
        "400":
          description: "Invalid request parameter"
        "404":
          description: "find no result"
   
  /gooddetail/priceNow/{pId}:
   get:
     tags:
      - GoodDetail
     summary: (前端需渲染特定訊息)取得特定商品各通路價格
     description: 把pId傳進來，[status]1：上架中, 2：下架, 3：色號從缺
     parameters:
      - name: pId
        in: path
        required: true
        description: 商品編號
        schema:
            type: string
            example: "a0000001"
     responses:
      "200":
        description: "success"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Price_Now'
            examples:
              example1:
                summary: 商品 a0000001 各通路價格資訊
                value:
                  results:
                    - pId: "a0000001"
                      store: "poya"
                      updateTime: "2025-03-03T19:00:00Z"
                      storePrice: 350
                      storeDiscount: "買一送一，限時優惠"
                      storeLink: "https://www.poya.com.tw/product/a0000001"
                      status: 1
                    - pId: "a0000001"
                      store: "watsons"
                      updateTime: "2025-03-03T19:00:00Z"
                      storePrice: 298
                      storeDiscount: "第二件 5 折"
                      storeLink: "https://www.watsons.com.tw/product/a0000001"
                      status: 2
                    - pId: "a0000001"
                      store: "cosmed"
                      updateTime: "2025-03-03T19:00:00Z"
                      storePrice: 298
                      storeDiscount: "滿 500 送 50"
                      storeLink: "https://www.cosmed.com.tw/product/a0000001"
                      status: 3
      "400":
        description: "Invalid request parameter"
      "404":
        description: "find no result"
  
  /gooddetail/productReview/{pId}:
    get:
      tags:
        - GoodDetail
