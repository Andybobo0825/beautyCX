name: beautycx

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: serverclient/Dockerfile
    image: beautycx-backend:local
    environment:
      PORT: 5001
      FLASK_DEBUG: "false"
      SQLALCHEMY_ECHO: "false"
      SECRET_KEY: ${SECRET_KEY:-dev_key_for_testing}
      DATABASE_PATH: /app/data/beautycx.sqlite
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      AWS_REGION: ${AWS_REGION:-ap-east-2}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-product-images}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-cdn.example.com}
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    image: beautycx-frontend:local
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
