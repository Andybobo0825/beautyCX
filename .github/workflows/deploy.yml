name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: meta
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${OWNER_LC}/beautycx-backend:sha-${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=ghcr.io/${OWNER_LC}/beautycx-frontend:sha-${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "backend_latest=ghcr.io/${OWNER_LC}/beautycx-backend:latest" >> "${GITHUB_OUTPUT}"
          echo "frontend_latest=ghcr.io/${OWNER_LC}/beautycx-frontend:latest" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./serverclient/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.backend_latest }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Client
          file: ./Client/Dockerfile
          push: true
          build-args: |
            REACT_APP_API_URL=/api
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.meta.outputs.frontend_latest }}

  check-deploy-secrets:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check EC2 deploy secrets
        id: check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          if [ -n "${EC2_HOST}" ] && [ -n "${EC2_USER}" ] && [ -n "${EC2_SSH_KEY}" ] && [ -n "${EC2_DEPLOY_PATH}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "EC2 deploy secrets are not fully configured; image build/push completed and deploy is skipped."
          fi

  deploy-ec2:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - check-deploy-secrets
    if: needs.check-deploy-secrets.outputs.enabled == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release files
        run: |
          mkdir -p release
          cp deploy/docker-compose.prod.yml release/docker-compose.prod.yml

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p "${{ secrets.EC2_DEPLOY_PATH }}"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "release/docker-compose.prod.yml"
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          CLOUDFRONT_DOMAIN: ${{ secrets.CLOUDFRONT_DOMAIN }}
          API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,APP_SECRET_KEY,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,S3_BUCKET_NAME,CLOUDFRONT_DOMAIN,API_GATEWAY_URL
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_DEPLOY_PATH }}"

            cat > .env <<EOF_ENV
            BACKEND_IMAGE=${BACKEND_IMAGE}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            HTTP_PORT=80
            SECRET_KEY=${APP_SECRET_KEY:-dev_key_for_testing}
            AWS_REGION=${AWS_REGION:-ap-east-2}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
            S3_BUCKET_NAME=${S3_BUCKET_NAME:-product-images}
            CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN:-cdn.example.com}
            API_GATEWAY_URL=${API_GATEWAY_URL:-}
            EOF_ENV

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
