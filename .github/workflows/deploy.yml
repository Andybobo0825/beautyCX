name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  frontend-artifact:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend artifact
        env:
          REACT_APP_API_URL: /api
          CI: "true"
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Client/build
          if-no-files-found: error

  backend-image:
    runs-on: ubuntu-latest

    outputs:
      image_repo: ${{ steps.image.outputs.image_repo }}
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image URI
        id: image
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_repo=ghcr.io/${OWNER_LC}/beautycx-backend" >> "${GITHUB_OUTPUT}"
          echo "image_uri=ghcr.io/${OWNER_LC}/beautycx-backend:sha-${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./serverclient
          file: ./serverclient/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_uri }}
            ${{ steps.image.outputs.image_repo }}:latest

  deploy-ec2:
    runs-on: ubuntu-latest
    needs:
      - frontend-artifact
      - backend-image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build

      - name: Prepare release bundle
        run: |
          mkdir -p release/nginx
          cp deploy/docker-compose.prod.yml release/docker-compose.prod.yml
          cp deploy/nginx/default.conf release/nginx/default.conf
          tar -czf release/frontend-build.tar.gz -C frontend-build .

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p "${{ secrets.EC2_DEPLOY_PATH }}/nginx"
            mkdir -p "${{ secrets.EC2_DEPLOY_PATH }}/frontend-build"

      - name: Upload release bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "release/docker-compose.prod.yml,release/frontend-build.tar.gz"
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          overwrite: true

      - name: Upload nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "release/nginx/default.conf"
          target: ${{ secrets.EC2_DEPLOY_PATH }}/nginx
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_DEPLOY_PATH }}"

            cat > .env <<'EOF'
            BACKEND_IMAGE=${{ needs.backend-image.outputs.image_uri }}
            EOF

            cat > backend.env <<'EOF'
            PORT=5001
            FLASK_DEBUG=false
            SQLALCHEMY_ECHO=false
            SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SERVER=${{ secrets.DB_SERVER }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_DRIVER=ODBC Driver 18 for SQL Server
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_DB=${{ secrets.REDIS_DB }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            CLOUDFRONT_DOMAIN=${{ secrets.CLOUDFRONT_DOMAIN }}
            API_GATEWAY_URL=${{ secrets.API_GATEWAY_URL }}
            EOF

            rm -rf frontend-build/*
            tar -xzf frontend-build.tar.gz -C frontend-build

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
